name: Backend

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore tools
        run: dotnet tool restore
        working-directory: backend/Amsterfam

      - name: Restore
        run: dotnet restore -p:HUSKY=0
        working-directory: backend/Amsterfam

      - name: Check formatting
        run: dotnet tool run csharpier check .
        working-directory: backend/Amsterfam

      - name: Build
        run: dotnet build -c Release --no-restore -p:HUSKY=0
        working-directory: backend/Amsterfam

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal --logger "trx;LogFileName=results.trx"
        working-directory: backend/Amsterfam

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: backend/Amsterfam/**/*.trx
          reporter: dotnet-trx
          fail-on-empty: false

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t amsterfam-backend .
        working-directory: backend/Amsterfam
