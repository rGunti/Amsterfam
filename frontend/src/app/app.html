<mat-toolbar>
  <button mat-icon-button (click)="navOpen.set(!navOpen())">
    <mat-icon>menu</mat-icon>
  </button>
  <span>{{ title() }}</span>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    [opened]="navOpen()"
    [mode]="sidenavMode()"
    (closed)="navOpen.set(false)"
    class="sidenav"
  >
    <mat-nav-list>
      <a mat-list-item routerLink="/" (click)="onNavLinkClick()">
        <mat-icon matListItemIcon>event</mat-icon>
        <span matListItemTitle>Events</span>
      </a>
      <a mat-list-item routerLink="/attendance" (click)="onNavLinkClick()">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Attendance</span>
      </a>
      <a mat-list-item routerLink="/accommodation" (click)="onNavLinkClick()">
        <mat-icon matListItemIcon>hotel</mat-icon>
        <span matListItemTitle>Accommodation</span>
      </a>
      <a mat-list-item routerLink="/activities" (click)="onNavLinkClick()">
        <mat-icon matListItemIcon>local_activity</mat-icon>
        <span matListItemTitle>Activities</span>
      </a>
      <a mat-list-item routerLink="/shopping" (click)="onNavLinkClick()">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Shopping</span>
      </a>
      <a mat-list-item routerLink="/profile" (click)="onNavLinkClick()">
        <mat-icon matListItemIcon>account_circle</mat-icon>
        <span matListItemTitle>Profile</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
