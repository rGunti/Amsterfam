<mat-toolbar>
  <button mat-icon-button (click)="navOpen.set(!navOpen())">
    <mat-icon>menu</mat-icon>
  </button>
  <span>{{ title() }}</span>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav [opened]="navOpen()" mode="side" class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/">
        <mat-icon matListItemIcon>event</mat-icon>
        <span matListItemTitle>Events</span>
      </a>
      <a mat-list-item routerLink="/attendance">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Attendance</span>
      </a>
      <a mat-list-item routerLink="/accommodation">
        <mat-icon matListItemIcon>hotel</mat-icon>
        <span matListItemTitle>Accommodation</span>
      </a>
      <a mat-list-item routerLink="/activities">
        <mat-icon matListItemIcon>local_activity</mat-icon>
        <span matListItemTitle>Activities</span>
      </a>
      <a mat-list-item routerLink="/shopping">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Shopping</span>
      </a>
      <a mat-list-item routerLink="/profile">
        <mat-icon matListItemIcon>account_circle</mat-icon>
        <span matListItemTitle>Profile</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
