services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: amsterfam
      POSTGRES_USER: amsterfam
      POSTGRES_PASSWORD: amsterfam
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amsterfam"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: backend/Amsterfam
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__Default: "Host=db;Database=amsterfam;Username=amsterfam;Password=amsterfam"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
